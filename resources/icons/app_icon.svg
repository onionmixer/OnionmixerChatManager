<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- OnionmixerChatManagerQt5 application icon
       Design: onion-shaped manager hub with live-chat bubbles and signal lines.
       Kept bold and low-detail so the mark remains readable at 16px. -->
  <defs>
    <linearGradient id="onionBody" x1="40" y1="24" x2="210" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ED957"/>
      <stop offset="0.52" stop-color="#35A66B"/>
      <stop offset="1" stop-color="#167A70"/>
    </linearGradient>
    <linearGradient id="corePanel" x1="68" y1="62" x2="196" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF8F2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B2B2A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="128" cy="134" r="106" fill="#0E3635" opacity="0.12"/>

  <!-- Onion silhouette -->
  <path fill="url(#onionBody)" filter="url(#shadow)"
        d="M128 22C93 54 58 90 58 142c0 58 35 94 70 94s70-36 70-94c0-52-35-88-70-120z"/>
  <path fill="#BCEB68"
        d="M128 19c-3 18-1 33 7 45 10-15 26-25 47-31-20 19-30 36-31 53-8-11-16-19-23-25-7 6-15 14-23 25-1-17-11-34-31-53 21 6 37 16 47 31 8-12 10-27 7-45z"/>

  <!-- Manager hub panel -->
  <rect x="64" y="78" width="128" height="100" rx="24" ry="24" fill="url(#corePanel)"/>
  <path fill="#167A70" opacity="0.18"
        d="M64 132h128v22c0 13-11 24-24 24H88c-13 0-24-11-24-24v-22z"/>

  <!-- Chat bubbles -->
  <g fill="#0E3635">
    <rect x="84" y="98" width="54" height="31" rx="12"/>
    <path d="M100 128l-14 15 4-18z"/>
    <rect x="118" y="130" width="54" height="31" rx="12"/>
    <path d="M154 160l16 14-6-18z"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="101" cy="114" r="4"/>
    <circle cx="113" cy="114" r="4"/>
    <circle cx="125" cy="114" r="4"/>
    <rect x="132" y="143" width="26" height="6" rx="3"/>
  </g>

  <!-- Live connection rails -->
  <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.95">
    <path d="M44 86c-13 22-19 46-17 73"/>
    <path d="M212 86c13 22 19 46 17 73"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="45" cy="166" r="9"/>
    <circle cx="211" cy="166" r="9"/>
  </g>
</svg>
