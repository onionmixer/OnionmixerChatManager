<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- OnionmixerBroadChatClient tray icon
       Design: chat bubble + broadcast wave. Works at 16px (base shape readable).
       Palette: deep orange (#E8632C) body + white content, matches main app accents. -->
  <defs>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F07E3E"/>
      <stop offset="1" stop-color="#E8632C"/>
    </linearGradient>
  </defs>
  <!-- Chat bubble body (rounded rect) -->
  <rect x="20" y="36" width="216" height="148" rx="28" ry="28" fill="url(#bubble)"/>
  <!-- Tail pointing down-left -->
  <path d="M 64 184 L 64 228 L 112 184 Z" fill="#E8632C"/>
  <!-- Broadcast wave arcs inside bubble (3 concentric arcs from left-center) -->
  <g fill="none" stroke="white" stroke-width="14" stroke-linecap="round">
    <path d="M 84 110 A 28 28 0 0 1 120 110"/>
    <path d="M 68 110 A 48 48 0 0 1 138 110"/>
    <path d="M 52 110 A 68 68 0 0 1 156 110"/>
  </g>
  <!-- Origin dot (broadcast source) -->
  <circle cx="84" cy="134" r="10" fill="white"/>
</svg>
