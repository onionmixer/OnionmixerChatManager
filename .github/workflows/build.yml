name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git pkg-config \
            qtbase5-dev qtbase5-dev-tools qttools5-dev qttools5-dev-tools \
            libqt5network5 libqt5widgets5 libqt5gui5 libqt5core5a \
            libqt5test5

      - name: Configure (Release, -Werror enforced)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DONIONMIXERCHATMANAGER_BUILD_BROADCHATCLIENT=ON

      - name: Build all targets
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Upload build artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 5.15.2 (MSVC 2019 64-bit)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets'
          cache: true

      - name: Configure (Release, no streamList)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DONIONMIXERCHATMANAGER_BUILD_BROADCHATCLIENT=ON `
            -DONIONMIXERCHATMANAGER_ENABLE_YT_STREAMLIST=OFF

      - name: Build all targets
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
