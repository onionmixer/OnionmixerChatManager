name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git pkg-config \
            qtbase5-dev qtbase5-dev-tools qttools5-dev qttools5-dev-tools \
            libqt5network5 libqt5widgets5 libqt5gui5 libqt5core5a \
            libqt5test5 \
            libprotobuf-dev libgrpc++-dev \
            protobuf-compiler protobuf-compiler-grpc

      - name: Configure (Release, -Werror enforced)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DONIONMIXERCHATMANAGER_BUILD_BROADCHATCLIENT=ON

      - name: Build all targets
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Upload build artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    # 첫 회: vcpkg cache miss 시 grpc/protobuf source 빌드로 30분+ 소요.
    # 두번째 회 이후: GitHub Actions cache hit 으로 < 5분.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 5.15.2 (MSVC 2019 64-bit)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets'
          cache: true

      - name: Setup vcpkg (manifest mode + binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (Release, streamList=ON via vcpkg)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DONIONMIXERCHATMANAGER_BUILD_BROADCHATCLIENT=ON

      - name: Build all targets
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package NSIS installers (server + client per Linux .deb policy)
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          $NsisOut = "$pwd\build\NSISBUILD"
          New-Item -Path $NsisOut -ItemType Directory -Force | Out-Null
          cd build

          # Server 인스톨러 — server + client 컴포넌트 동봉 (방송 PC).
          # Linux 의 onionmixerchatmanagerqt5_*.deb 등가.
          cpack -G NSIS -C Release `
            "-DCPACK_COMPONENTS_ALL=server;client" `
            "-DCPACK_PACKAGE_FILE_NAME=onionmixerchatmanagerqt5-0.1.0-win64" `
            "-DCPACK_NSIS_DISPLAY_NAME=Onionmixer Chat Manager" `
            "-DCPACK_NSIS_PACKAGE_NAME=Onionmixer Chat Manager" `
            "-DCPACK_PACKAGE_INSTALL_DIRECTORY=OnionmixerChatManager" `
            "-DCPACK_PACKAGE_EXECUTABLES=OnionmixerChatManagerQt5;Onionmixer Chat Manager;OnionmixerBroadChatClient;BroadChat Client" `
            "-DCPACK_PACKAGE_DIRECTORY=$NsisOut"

          # Client 인스톨러 — client 컴포넌트 단독 (렌더링 PC).
          # Linux 의 onionmixerbroadchatclient_*.deb 등가.
          cpack -G NSIS -C Release `
            "-DCPACK_COMPONENTS_ALL=client" `
            "-DCPACK_PACKAGE_FILE_NAME=onionmixerbroadchatclient-0.1.0-win64" `
            "-DCPACK_NSIS_DISPLAY_NAME=Onionmixer BroadChat Client" `
            "-DCPACK_NSIS_PACKAGE_NAME=Onionmixer BroadChat Client" `
            "-DCPACK_PACKAGE_INSTALL_DIRECTORY=OnionmixerBroadChatClient" `
            "-DCPACK_PACKAGE_EXECUTABLES=OnionmixerBroadChatClient;Onionmixer BroadChat Client" `
            "-DCPACK_PACKAGE_DIRECTORY=$NsisOut"

      - name: Upload NSIS installers
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installers-windows
          path: build/NSISBUILD/onionmixer*-*-win64.exe
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
